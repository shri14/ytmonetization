[build]
  functions = "netlify/functions"

# Plans API
[[redirects]]
  from   = "/api/plans"
  to     = "/.netlify/functions/plans"
  status = 200
  force  = true

# Orders API
[[redirects]]
  from   = "/api/orders"
  to     = "/.netlify/functions/orders"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/orders/*"
  to     = "/.netlify/functions/orders"
  status = 200
  force  = true

# Serve actual HTML files directly — never redirect these
[[redirects]]
  from   = "/admin.html"
  to     = "/admin.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/checkout.html"
  to     = "/checkout.html"
  status = 200
  force  = false
